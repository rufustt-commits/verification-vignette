<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vérification de vignette</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.card {
    background: white;
    padding: 20px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.status {
    background: green;
    color: white;
    padding: 10px;
    text-align: center;
    border-radius: 5px;
    margin-bottom: 15px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="card">
    <h3>Vérification de vignette</h3>
    <div class="status">VALIDE</div>

    <p><b>Plaque :</b> 18V3792D</p>
    <p><b>Vignette :</b> Véhicule Particulier</p>
    <p><b>Couleur :</b> #000000</p>
    <p><b>Validité vignette :</b> 2026-08-02</p>
    <p><b>Validité vitres fumées :</b> 2026-12-31</p>
    <p><b>Status :</b> VALIDE</p>
</div>

</body>
</html>
